<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Challenge | CyberGuard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hint-item { animation: slideIn 0.3s ease-out; border-left: 4px solid #eab308; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(37,99,235,0.2); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Cyber Navbar -->
    <nav class="w-full border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-[1000]">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-wrap items-center justify-between gap-4">
            <a href="/" class="flex items-center gap-2 group">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black group-hover:rotate-12 transition-transform shadow-[0_0_15px_rgba(37,99,235,0.4)]">C</div>
                <span class="font-black tracking-tighter text-xl italic uppercase">Cyber<span class="text-blue-500 text-sm">Guard</span></span>
            </a>

            <div class="flex items-center gap-1 bg-white/5 p-1 rounded-2xl border border-white/5">
                <a href="/lab/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 hover:text-blue-400 transition-all text-slate-400">🔬 Lab</a>
                <a href="/strength/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 hover:text-blue-400 transition-all text-slate-400">🛡️ Güc Ölçən</a>
                <a href="/rainbow/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest bg-white/10 text-blue-400 transition-all shadow-sm">🌈 Rainbow Game</a>
            </div>

            <div class="hidden md:flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></span>
                <span class="text-[10px] font-mono text-emerald-500/80 uppercase tracking-widest">System Online</span>
            </div>
        </div>
    </nav>

    <!-- Əsas Məzmun -->
    <main class="flex-1 flex flex-col items-center justify-center p-6 space-y-8">
        
        <div class="w-full max-w-2xl glass-card p-8 md:p-12 rounded-[40px] md:rounded-[60px] text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-20"></div>
            
            <div class="inline-block p-4 bg-yellow-500/10 rounded-3xl mb-6 text-2xl">🏆</div>
            <h1 class="text-4xl font-black mb-4 italic uppercase tracking-tighter">Rainbow Attack</h1>
            <p class="text-slate-500 text-sm mb-10 max-w-md mx-auto italic leading-relaxed">Hədəf parolu tapın. Hər səhv cəhddə sistem paroldan bir simvol sızdıracaq.</p>

            <!-- Dinamik Hash -->
            <div id="targetHashBox" class="bg-black/60 border border-blue-500/20 p-6 rounded-2xl font-mono text-xs text-blue-400 mb-8 break-all select-all shadow-inner tracking-tight">
                {{ target_hash }}
            </div>

            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="g" placeholder="Parolu təxmin edin..." 
                       class="flex-1 bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-yellow-500 text-white font-bold transition-all placeholder:text-slate-600 shadow-sm"
                       autocomplete="off">
                <button onclick="play()" 
                        class="bg-yellow-600 hover:bg-yellow-500 px-10 py-5 rounded-2xl font-black transition-all active:scale-95 shadow-lg shadow-yellow-900/20 uppercase tracking-widest text-sm">
                    SINA
                </button>
            </div>

            <!-- Status Mesajı -->
            <div id="m" class="mt-8 h-6 font-black tracking-widest text-sm italic transition-all duration-300"></div>

            <!-- Analiz Tarixçəsi -->
            <div id="hintContainer" class="hidden mt-8 text-left border-t border-white/5 pt-6">
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.3em] mb-4 flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                    Sızdırılmış Məlumatlar
                </p>
                <div id="hintList" class="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Dinamik ipucular -->
                </div>
            </div>
        </div>

    </main>

    <footer class="p-8 text-center text-slate-600 text-[10px] uppercase tracking-[0.2em]">
        CyberGuard Security Lab &copy; 2026
    </footer>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function play() {
            const guessInput = document.getElementById('g');
            const guess = guessInput.value.trim();
            const m = document.getElementById('m');
            const hContainer = document.getElementById('hintContainer');
            const hList = document.getElementById('hintList');
            const hashBox = document.getElementById('targetHashBox');

            if (!guess) {
                m.innerText = "MƏLUMAT DAXİL EDİLMƏYİB!";
                m.className = "mt-8 h-6 font-black tracking-widest text-sm italic text-orange-400";
                return;
            }

            m.innerText = "Yoxlanılır...";
            m.className = "mt-8 h-6 font-black tracking-widest text-sm italic text-slate-500 animate-pulse";

            fetch('/api/rainbow-challenge/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ guess: guess })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    m.innerText = data.message.toUpperCase();
                    m.className = "mt-8 h-6 font-black tracking-widest text-sm italic text-green-500 animate-bounce";
                    hContainer.classList.add('hidden');
                    setTimeout(() => location.reload(), 3000);
                } else {
                    m.innerText = data.message.toUpperCase();
                    m.className = "mt-8 h-6 font-black tracking-widest text-sm italic text-red-500";

                    // Hash dəyişmədiyi üçün hashBox.innerText = data.new_hash burada sadəcə təhlükəsizlik üçündür
                    if (data.new_hash) hashBox.innerText = data.new_hash;

                    if (data.hint) {
                        hContainer.classList.remove('hidden');
                        
                        // İpucunu nöqtələrlə vizuallaşdıraq
                        const dots = ".".repeat(data.hint.length - data.hint.revealed.length);
                        
                        const hintHTML = `
                            <div class="hint-item bg-white/5 p-4 rounded-2xl flex flex-col gap-2 group hover:border-blue-500/30 transition-all">
                                <div class="flex justify-between items-center text-[10px] font-mono text-slate-500 italic">
                                    <span>Səhv cəhd: "${guess}"</span>
                                    <span class="bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded border border-blue-500/10 font-bold uppercase tracking-tighter">İPUCU #${data.hint.count}</span>
                                </div>
                                <div class="text-[14px] font-mono tracking-widest leading-relaxed">
                                    Parol: <span class="text-green-400 font-black">${data.hint.revealed}</span><span class="text-slate-600">${dots}</span>
                                    <span class="text-[10px] text-slate-500 ml-2 tracking-normal italic">(${data.hint.length} simvol)</span>
                                </div>
                            </div>
                        `;

                        hList.insertAdjacentHTML('afterbegin', hintHTML);
                    }

                    guessInput.value = "";
                    guessInput.focus();
                }
            })
            .catch(err => {
                m.innerText = "SİSTEM XƏTASI!";
                m.className = "mt-8 h-6 font-black tracking-widest text-sm italic text-red-700";
                console.error(err);
            });
        }

        document.getElementById('g').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') play();
        });
    </script>
</body>
</html>
