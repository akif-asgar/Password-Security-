<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parol Gücü | CyberGuard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Cyber Navbar Start -->
    <nav class="w-full border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-[1000]">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-wrap items-center justify-between gap-4">
            <!-- Logo -->
            <a href="/" class="flex items-center gap-2 group">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black group-hover:rotate-12 transition-transform shadow-[0_0_15px_rgba(37,99,235,0.4)]">C</div>
                <span class="font-black tracking-tighter text-xl italic uppercase">Cyber<span class="text-blue-500 text-sm">Guard</span></span>
            </a>

            <!-- Menu Links -->
            <div class="flex items-center gap-1 bg-white/5 p-1 rounded-2xl border border-white/5">
                <a href="/lab/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 hover:text-blue-400 transition-all text-slate-400">
                    🔬 Lab
                </a>
                <a href="/strength/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest bg-white/10 text-blue-400 transition-all shadow-sm">
                    🛡️ Güc Ölçən
                </a>
                <a href="/rainbow/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 hover:text-blue-400 transition-all text-slate-400">
                    🌈 Rainbow Game
                </a>
            </div>

            <!-- System Status -->
            <div class="hidden md:flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></span>
                <span class="text-[10px] font-mono text-emerald-500/80 uppercase tracking-widest">System Online</span>
            </div>
        </div>
    </nav>
    <!-- Cyber Navbar End -->

    <!-- Əsas Məzmun - Ekranın ortasında yerləşir -->
    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md glass-card p-10 rounded-[40px] shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-20"></div>
            
            <h2 class="text-3xl font-black mb-2 italic tracking-tighter">PASSWORD CHECK</h2>
            <p class="text-slate-500 text-[10px] mb-8 uppercase tracking-[0.3em]">Real-time security analysis</p>

            <input type="password" id="p" oninput="check()" placeholder="••••••••" 
                   class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-white text-2xl tracking-[0.5em] outline-none focus:border-blue-500 transition-all mb-6 placeholder:text-slate-800">
            
            <!-- Tərəzi (Progress Bar) -->
            <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden mb-4">
                <div id="bar" class="h-full w-0 transition-all duration-500 bg-red-600"></div>
            </div>

            <div class="flex justify-between items-center mb-8">
                <span id="txt" class="text-[10px] font-black uppercase text-slate-500 italic tracking-widest">Waiting...</span>
                <span id="perc" class="text-xs font-mono text-blue-400">0%</span>
            </div>

            <!-- Təhlükə Xəbərdarlığı -->
            <div id="warn" class="hidden p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-[10px] font-bold text-center italic animate-pulse">
                BU PAROL ARTIQ SIZIB! İSTİFADƏ ETMƏYİN.
            </div>
        </div>
    </main>

    <script>
        function check() {
            const v = document.getElementById('p').value;
            const b = document.getElementById('bar');
            const t = document.getElementById('txt');
            const w = document.getElementById('warn');
            const percText = document.getElementById('perc');
            const common = ['123456', 'password', 'admin', 'qwerty', '12345678', '12345'];
            
            let s = 0;
            if(v.length === 0) s = 0;
            else {
                if(v.length > 7) s += 25;
                if(/[A-Z]/.test(v)) s += 25;
                if(/[0-9]/.test(v)) s += 25;
                if(/[^A-Za-z0-9]/.test(v)) s += 25;
            }

            b.style.width = s + "%";
            percText.innerText = s + "%";

            // Sızmış parol yoxlanışı
            if(v.length > 0 && common.includes(v.toLowerCase())) {
                w.classList.remove('hidden');
                b.style.width = "100%";
                b.className = "h-full bg-red-900 shadow-[0_0_15px_rgba(127,29,29,0.8)]";
                t.innerText = "CRITICAL RISK";
                t.className = "text-[10px] font-black uppercase text-red-500 italic tracking-widest";
                return;
            } else {
                w.classList.add('hidden');
            }

            // Güc səviyyələri
            if(v.length === 0) {
                b.className = "h-full bg-white/5";
                t.innerText = "Waiting...";
                t.className = "text-[10px] font-black uppercase text-slate-500 italic tracking-widest";
            }
            else if(s <= 25) { 
                b.className = "h-full bg-red-600 shadow-[0_0_15px_rgba(220,38,38,0.5)]"; 
                t.innerText = "TOO WEAK"; 
                t.className = "text-[10px] font-black uppercase text-red-600 italic tracking-widest";
            }
            else if(s <= 50) { 
                b.className = "h-full bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.4)]"; 
                t.innerText = "WEAK"; 
                t.className = "text-[10px] font-black uppercase text-orange-500 italic tracking-widest";
            }
            else if(s <= 75) { 
                b.className = "h-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.4)]"; 
                t.innerText = "GOOD"; 
                t.className = "text-[10px] font-black uppercase text-blue-500 italic tracking-widest";
            }
            else { 
                b.className = "h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]"; 
                t.innerText = "STRONG"; 
                t.className = "text-[10px] font-black uppercase text-emerald-500 italic tracking-widest";
            }
        }
    </script>
</body>
</html>
