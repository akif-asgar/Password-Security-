<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiber Laboratoriya | CyberGuard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #16a34a; border-radius: 10px; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-danger { animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Cyber Navbar Start -->
    <nav class="w-full border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-[1000]">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-wrap items-center justify-between gap-4">
            <a href="/" class="flex items-center gap-2 group">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black group-hover:rotate-12 transition-transform shadow-[0_0_15px_rgba(37,99,235,0.4)]">C</div>
                <span class="font-black tracking-tighter text-xl italic uppercase">Cyber<span class="text-blue-500 text-sm">Guard</span></span>
            </a>

            <div class="flex items-center gap-1 bg-white/5 p-1 rounded-2xl border border-white/5">
                <a href="/lab/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest bg-white/10 text-blue-400 shadow-sm transition-all">🔬 Lab</a>
                <a href="/strength/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 hover:text-blue-400 transition-all text-slate-400">🛡️ Güc Ölçən</a>
                <a href="/rainbow/" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 hover:text-blue-400 transition-all text-slate-400">🌈 Rainbow Game</a>
            </div>

            <div class="hidden md:flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></span>
                <span class="text-[10px] font-mono text-emerald-500/80 uppercase tracking-widest">System Online</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-12">
        <div class="max-w-5xl mx-auto">
            <header class="text-center mb-12">
                <h1 class="text-5xl font-black bg-gradient-to-r from-blue-500 via-emerald-500 to-blue-500 bg-clip-text text-transparent italic uppercase tracking-tighter mb-4">Cyber Lab Simulation</h1>
                <p class="text-slate-500 text-xs uppercase tracking-[0.4em]">Algorithm Strength & Vulnerability Analysis</p>
            </header>
            
            <div class="grid md:grid-cols-5 gap-8">
                <!-- Control Panel -->
                <div class="md:col-span-2 space-y-6">
                    <div class="glass p-8 rounded-[32px] border-white/5 shadow-2xl">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3 ml-1 tracking-widest">Target Password</label>
                                <input type="text" id="labPassword" placeholder="Məs: 123456 və ya S7r0ng!" 
                                       class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500 transition-all font-mono">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3 ml-1 tracking-widest">Encryption Method</label>
                                <select id="labMethod" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-blue-500 appearance-none cursor-pointer">
                                    <option value="plain">Plain Text (No Security)</option>
                                    <option value="sha256">SHA-256 (Fast / Weak)</option>
                                    <option value="salted">SHA-256 + Salt (Medium)</option>
                                    <option value="bcrypt">Bcrypt (Slow / Secure)</option>
                                </select>
                            </div>
                            <button onclick="startAttack()" 
                                    class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black transition-all shadow-[0_10px_20px_rgba(37,99,235,0.2)] active:scale-95 uppercase tracking-widest text-sm">
                                Launch Simulation
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Live Results -->
                <div class="md:col-span-3">
                    <div id="resultPlaceholder" class="h-full flex items-center justify-center border-2 border-dashed border-white/5 rounded-[32px] text-slate-700 font-bold uppercase tracking-widest text-sm italic">
                        Waiting for initiation...
                    </div>

                    <div id="resultCard" class="hidden glass p-8 rounded-[32px] border-blue-500/20 h-full flex flex-col justify-between shadow-2xl">
                        <div>
                            <div class="flex justify-between items-start mb-8">
                                <div id="statusBadge" class="px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest"></div>
                                <div class="text-right">
                                    <span class="block text-[10px] text-slate-500 font-bold uppercase mb-1">Time Elapsed</span>
                                    <span id="attackTime" class="text-2xl font-black text-white italic tracking-tighter"></span>
                                </div>
                            </div>

                            <div class="space-y-6">
                                <div>
                                    <span class="block text-[10px] text-blue-500 uppercase mb-2 font-bold tracking-widest flex items-center gap-2">
                                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> Generated Hash
                                    </span>
                                    <div id="hashOutput" class="font-mono text-[11px] break-all text-slate-300 bg-black/60 p-5 rounded-2xl border border-white/5 leading-relaxed shadow-inner"></div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-8 pt-6 border-t border-white/5 flex items-center justify-between">
                            <span class="text-[10px] text-slate-600 font-mono italic">Lab Report #CG-2026</span>
                            <button onclick="location.reload()" class="text-[10px] text-blue-400 hover:text-white transition-colors font-bold uppercase tracking-widest">Reset Lab</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- HACKER TERMINAL MODAL -->
    <div id="terminalModal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4">
        <div class="w-full max-w-3xl glass p-1 rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(37,99,235,0.1)]">
            <div class="bg-white/5 px-6 py-3 border-b border-white/10 flex items-center justify-between">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/20 border border-green-500/50"></div>
                </div>
                <span class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Brute-Force Simulator</span>
            </div>
            <div class="p-8">
                <div id="terminalLines" class="h-80 font-mono text-emerald-500/90 text-sm overflow-y-auto space-y-1 mb-8 custom-scrollbar pr-4"></div>
                <div id="terminalStatus" class="text-center text-4xl font-black italic tracking-widest opacity-0 transition-opacity duration-300"></div>
            </div>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function startAttack() {
            const pass = document.getElementById('labPassword').value;
            const method = document.getElementById('labMethod').value;
            if(!pass) return alert("Zəhmət olmasa parol daxil edin!");

            const modal = document.getElementById('terminalModal');
            const lines = document.getElementById('terminalLines');
            const status = document.getElementById('terminalStatus');

            modal.classList.remove('hidden');
            lines.innerHTML = "";
            status.style.opacity = "0";
            status.innerText = "PROCESSING...";

            fetch('/process/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({password: pass, method: method})
            })
            .then(r => r.json())
            .then(data => {
                let baseLogs = [
                    "> System initialized...",
                    `> Method identified: ${method.toUpperCase()}`,
                    "> Loading Rainbow Tables...",
                    "> Checking Global Leak Database (14.2B entries)..."
                ];

                if(data.attack.is_popular) {
                    baseLogs.push("> !!! ALERT: COMMON PASSWORD DETECTED !!!");
                    baseLogs.push("> Dictionary match found in 0.002s");
                } else {
                    baseLogs.push("> No direct match found. Starting computational analysis...");
                    baseLogs.push("> Salt entropy checking...");
                }

                let i = 0;
                const timer = setInterval(() => {
                    const p = document.createElement('p');
                    if (i < baseLogs.length) {
                        p.innerText = baseLogs[i];
                        p.className = baseLogs[i].includes('ALERT') ? 'text-red-500 font-bold' : '';
                    } else {
                        p.innerText = `> Testing iteration ${i*1240}... Hash: ${Math.random().toString(16).substring(2,12)}`;
                        p.className = 'text-emerald-500/40';
                    }
                    
                    lines.appendChild(p);
                    lines.scrollTop = lines.scrollHeight;
                    i++;

                    if(i > 25) {
                        clearInterval(timer);
                        status.style.opacity = "1";
                        const safe = data.attack.status.includes("SECURED");
                        status.innerText = safe ? "UNBREAKABLE" : "LEAKED";
                        status.className = `text-center text-4xl font-black italic tracking-widest ${safe ? 'text-blue-500' : 'text-red-500 animate-danger'}`;
                        
                        setTimeout(() => {
                            modal.classList.add('hidden');
                            showResult(data);
                        }, 2000);
                    }
                }, 70);
            })
            .catch(err => {
                alert("Server xətası! URLs və views hissəsini yoxlayın.");
                modal.classList.add('hidden');
            });
        }

        function showResult(data) {
            document.getElementById('resultPlaceholder').classList.add('hidden');
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('hashOutput').innerText = data.result.hash;
            document.getElementById('attackTime').innerText = data.attack.time;
            
            const b = document.getElementById('statusBadge');
            const safe = data.attack.status.includes("SECURED");
            b.innerText = data.attack.status;
            b.className = `px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${safe ? 'bg-blue-500/10 text-blue-500 border border-blue-500/20' : 'bg-red-500/10 text-red-500 border border-red-500/20'}`;
        }
    </script>
</body>
</html>
